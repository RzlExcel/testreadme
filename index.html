<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas AJAX - Avrizal Setyo Aji Nugroho</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fceaea;
            /* Latar belakang merah sangat muda */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(180, 0, 0, 0.15);
            /* Bayangan kemerahan */
            text-align: center;
            width: 100%;
            max-width: 500px;
            border-top: 5px solid #d9534f;
            /* Garis atas merah */
        }

        h2 {
            color: #c9302c;
            /* Judul merah gelap */
            margin-bottom: 20px;
        }

        button {
            background-color: #d9534f;
            /* Tombol merah */
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #c9302c;
            /* Merah lebih gelap saat hover */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .item-profil {
            text-align: left;
            background: #fff5f5;
            /* Background item merah pucat */
            border: 1px solid #ffcccc;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            font-size: 14px;
            border-left: 4px solid #d9534f;
            /* Aksen garis kiri merah */
        }

        .highlight {
            color: #d9534f;
            font-weight: bold;
        }

        #hasil-profil em {
            color: #999;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Daftar Tim Proyek</h2>
        <button id="btn-tampilkan">Muat Semua Data</button>

        <div id="hasil-profil">
        </div>
    </div>

    <script>
        document.getElementById('btn-tampilkan').addEventListener('click', function () {
            const wadah = document.getElementById('hasil-profil');
            wadah.innerHTML = "<em>Sedang mengambil data...</em>";

            fetch('data.php')
                .then(response => {
                    if (!response.ok) throw new Error('Gagal');
                    return response.json();
                })
                .then(data => {
                    wadah.innerHTML = ""; // Bersihkan teks loading

                    data.forEach(user => {
                        const divUser = document.createElement('div');
                        divUser.className = 'item-profil';
                        divUser.innerHTML = `
                            <span class="highlight">Nama:</span> ${user.nama} | 
                            <span class="highlight">Pekerjaan:</span> ${user.pekerjaan} | 
                            <span class="highlight">Lokasi:</span> ${user.lokasi}
                        `;
                        wadah.appendChild(divUser);
                    });
                })
                .catch(error => {
                    wadah.innerHTML = "<span style='color:red;'>Terjadi kesalahan koneksi.</span>";
                });
        });
    </script>

</body>

</html>
